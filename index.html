<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Magic World ✨</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div id="app"></div>
  <div id="ui"></div>
  <!-- Loading veil: painted before the JS bundle loads, removed by main.js
       only after every shader is compiled and warm-up frames have rendered. -->
  <div id="mw-loading">
    <div class="mw-load-orb"></div>
    <div class="mw-load-text">Summoning the island&hellip;</div>
  </div>
  <style>
    #mw-loading {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 22px; background: radial-gradient(ellipse at 50% 40%, #1a2447 0%, #0a0e22 70%);
      font-family: system-ui, sans-serif; color: #cfe3ff;
      transition: opacity 0.6s ease;
    }
    #mw-loading.mw-load-done { opacity: 0; pointer-events: none; }
    .mw-load-orb {
      width: 56px; height: 56px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff, #7fe7ff 40%, #4a6cf2 75%);
      box-shadow: 0 0 32px 10px rgba(127, 231, 255, 0.45);
      animation: mw-load-breathe 1.4s ease-in-out infinite alternate;
    }
    .mw-load-text { font-size: 17px; letter-spacing: 0.08em; opacity: 0.9; }
    @keyframes mw-load-breathe {
      from { transform: scale(0.85); box-shadow: 0 0 22px 6px rgba(127, 231, 255, 0.3); }
      to   { transform: scale(1.1);  box-shadow: 0 0 42px 14px rgba(127, 231, 255, 0.6); }
    }
  </style>
  <script>
    // Runtime error collector for automated QA
    window.__gameErrors = [];
    window.addEventListener('error', (e) => window.__gameErrors.push(String(e.message || e)));
    window.addEventListener('unhandledrejection', (e) => window.__gameErrors.push('rejection: ' + String(e.reason)));
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
